 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Resume Builder Pro + Interview Questions</h1>

<input type="text" id="name" placeholder="Full Name">

<input type="email" id="email" placeholder="Email Address">

<input type="text" id="phone" placeholder="Phone Number">

<input type="text" id="address" placeholder="Address">

<input type="text" id="linkedin" placeholder="LinkedIn Profile Link">

<input type="text" id="github" placeholder="GitHub Profile Link">

<input type="text" id="education" placeholder="Education">

<textarea id="objective" placeholder="Career Objective"></textarea>

<textarea id="internship" placeholder="Internship Experience"></textarea>

<textarea id="projects" placeholder="Projects"></textarea>

<textarea id="certificates" placeholder="Certificates"></textarea>

<textarea id="achievements" placeholder="Achievements"></textarea>

<input type="text" id="languages" placeholder="Languages Known">

<input type="text" id="interests" placeholder="Interests / Hobbies">

<h3>Select Skills</h3>

<label><input type="checkbox" class="skill" value="HTML"> HTML</label>
<label><input type="checkbox" class="skill" value="CSS"> CSS</label>
<label><input type="checkbox" class="skill" value="JavaScript"> JavaScript</label>
<label><input type="checkbox" class="skill" value="Java"> Java</label>
<label><input type="checkbox" class="skill" value="Python"> Python</label>
<label><input type="checkbox" class="skill" value="C"> C</label>
<label><input type="checkbox" class="skill" value="C++"> C++</label>
<label><input type="checkbox" class="skill" value="SQL"> SQL</label>
<label><input type="checkbox" class="skill" value="React"> React</label>
<label><input type="checkbox" class="skill" value="Node.js"> Node.js</label>
<label><input type="checkbox" class="skill" value="MongoDB"> MongoDB</label>
<label><input type="checkbox" class="skill" value="Power BI"> Power BI</label>

<br><br>

<label><b>Upload Profile Photo</b></label>
<input type="file" id="photo" accept="image/*">

<br><br>

<button onclick="generateResume()">Generate Resume</button>

<div id="resumeOutput"></div>
